<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — Mihira</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="toast-container"></div>
    <aside id="sidebar"></aside>

    <div class="main-content">
        <div class="page-header">
            <div><h1>Analytics</h1><p class="subtitle">Sales insights & trends</p></div>
            <div class="controls">
                <input type="date" id="dateFrom">
                <input type="date" id="dateTo">
                <div class="tabs" id="presetTabs">
                    <button class="tab-btn active" data-preset="all">All Time</button>
                    <button class="tab-btn" data-preset="month">This Month</button>
                    <button class="tab-btn" data-preset="week">This Week</button>
                </div>
            </div>
        </div>

        <div id="loading" class="loading-state"><div class="spinner"></div><p>Loading analytics...</p></div>

        <div id="analyticsContent" class="hidden">
            <div class="stats-row" id="kpiRow"></div>
            <div class="chart-grid">
                <div class="chart-card glass"><h3>Monthly Revenue</h3><canvas id="monthlyChart"></canvas></div>
                <div class="chart-card glass"><h3>Weekly Revenue</h3><canvas id="weeklyChart"></canvas></div>
                <div class="chart-card glass"><h3>Top 10 Products</h3><canvas id="topProductsChart"></canvas></div>
                <div class="chart-card glass"><h3>Trending Colors</h3><canvas id="colorsChart"></canvas></div>
                <div class="chart-card glass"><h3>Delivery Pipeline</h3><canvas id="deliveryChart"></canvas></div>
                <div class="chart-card glass"><h3>Payment Status</h3><canvas id="paymentChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>window.APP_CONFIG={API_URL:"https://script.google.com/macros/s/AKfycbwQQrxrQ2A2XuH82kkXM69fX8uskeY93yjos1-AJzKHLhAc682fCLGajURcIlf2tw0M/exec"};</script>
    <script src="shared.js"></script>
    <script src="analytics.js"></script>
</body>
</html>
