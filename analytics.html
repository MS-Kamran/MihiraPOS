<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — Mihira</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="toast-container"></div>
    <aside id="sidebar"></aside>

    <div class="main-content">
        <div class="page-header" style="flex-wrap:wrap;gap:12px;">
            <div><h1>Analytics</h1><p class="subtitle">Sales insights & trends</p></div>
            <div class="controls" style="flex-wrap:wrap;gap:8px;align-items:center;">
                <input type="date" id="dateFrom" class="form-input" style="padding:8px 10px;height:38px;">
                <span style="color:var(--text-muted);font-size:12px;">to</span>
                <input type="date" id="dateTo" class="form-input" style="padding:8px 10px;height:38px;">
                <div class="tabs" id="presetTabs" style="gap:4px;">
                    <button class="tab-btn" data-preset="today">Today</button>
                    <button class="tab-btn" data-preset="week">Week</button>
                    <button class="tab-btn" data-preset="month">Month</button>
                    <button class="tab-btn active" data-preset="all">All</button>
                </div>
            </div>
        </div>

        <div id="loading" class="loading-state"><div class="spinner"></div><p>Loading analytics...</p></div>

        <div id="analyticsContent" class="hidden">
            <!-- Sales Target Tracker -->
            <div class="chart-card glass" style="margin-bottom:14px; grid-column: 1 / -1;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <h3 style="font-size:14px; margin:0;"><i class="ri-focus-2-line" style="color:var(--primary);"></i> Sales Target Tracker</h3>
                    <button id="btnSetTarget" class="btn btn-outline" style="padding:4px 8px; font-size:11px; border:1px solid var(--border); background:transparent; color:var(--text); border-radius:4px;"><i class="ri-edit-line"></i> Set Target</button>
                </div>
                <div id="salesTargetContainer" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px;">
                    <!-- Target bars will be injected here -->
                </div>
            </div>

            <!-- KPI Row -->
            <div class="stats-row" id="kpiRow" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;"></div>

            <!-- Charts Grid -->
            <div class="chart-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;">
                <!-- Low Stock Alerts -->
                <div class="chart-card glass" style="grid-column:1/-1;background:rgba(239,68,68,0.04);border-color:rgba(239,68,68,0.15);">
                    <h3 style="color:#ef4444;font-size:14px;margin-bottom:8px;"><i class="ri-alert-line"></i> Low Stock Alerts</h3>
                    <div id="lowStockList" style="display:flex;gap:8px;overflow-x:auto;padding:8px 0;"></div>
                </div>

                <!-- Daily Revenue -->
                <div class="chart-card glass"><h3 style="font-size:14px;">Daily Revenue (14 Days)</h3><canvas id="dailyChart"></canvas></div>

                <!-- Daily Orders -->
                <div class="chart-card glass"><h3 style="font-size:14px;">Daily Orders (14 Days)</h3><canvas id="dailyOrdersChart"></canvas></div>

                <!-- Monthly Revenue -->
                <div class="chart-card glass"><h3 style="font-size:14px;">Monthly Revenue</h3><canvas id="monthlyChart"></canvas></div>

                <!-- Top 10 Products -->
                <div class="chart-card glass"><h3 style="font-size:14px;">Top 10 Products</h3><canvas id="topProductsChart"></canvas></div>

                <!-- Trending Colors -->
                <div class="chart-card glass"><h3 style="font-size:14px;">Trending Colors</h3><canvas id="colorsChart"></canvas></div>

                <!-- Top 5 Customers -->
                <div class="chart-card glass"><h3 style="font-size:14px;">Top 5 Customers</h3><canvas id="topCustomersChart"></canvas></div>

                <!-- Revenue vs Collection -->
                <div class="chart-card glass"><h3 style="font-size:14px;">Revenue vs Collection</h3><canvas id="revenueVsCollectionChart"></canvas></div>

                <!-- Delivery Pipeline -->
                <div class="chart-card glass"><h3 style="font-size:14px;">Delivery Pipeline</h3><canvas id="deliveryChart"></canvas></div>

                <!-- Payment Status -->
                <div class="chart-card glass"><h3 style="font-size:14px;">Payment Status</h3><canvas id="paymentChart"></canvas></div>
            </div>
        </div>
    </div>

    <!-- Sales Target Modal -->
    <div id="targetModal" class="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;">
        <div class="modal glass" style="width:100%;max-width:400px;background:var(--panel-solid);padding:20px;border-radius:12px;">
            <h3 style="margin-top:0;margin-bottom:16px;">Set Sales Targets</h3>
            <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px;">
                <label style="font-size:12px;color:var(--text-muted);">Daily Target (Leave blank for auto)</label>
                <input type="number" id="inputDailyTarget" placeholder="e.g. 5000" class="form-input">
                <label style="font-size:12px;color:var(--text-muted);">Weekly Target (Leave blank for auto)</label>
                <input type="number" id="inputWeeklyTarget" placeholder="e.g. 35000" class="form-input">
                <label style="font-size:12px;color:var(--text-muted);">Monthly Target (Leave blank for auto)</label>
                <input type="number" id="inputMonthlyTarget" placeholder="e.g. 150000" class="form-input">
            </div>
            <div style="display:flex;justify-content:flex-end;gap:10px;">
                <button class="btn btn-ghost" onclick="document.getElementById('targetModal').style.display='none'">Cancel</button>
                <button class="btn btn-primary" id="btnSaveTarget">Save Targets</button>
            </div>
        </div>
    </div>

    <script>window.APP_CONFIG={API_URL:"https://script.google.com/macros/s/AKfycbwQQrxrQ2A2XuH82kkXM69fX8uskeY93yjos1-AJzKHLhAc682fCLGajURcIlf2tw0M/exec"};</script>
    <script src="shared.js"></script>
    <script src="analytics.js"></script>
</body>
</html>
