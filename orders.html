<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders — Mihira</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    <aside id="sidebar"></aside>

    <div class="main-content">
        <div class="page-header">
            <div><h1>Order Management</h1><p class="subtitle">Track order lifecycle</p></div>
        </div>

        <!-- Status Tabs -->
        <div class="tabs" id="statusTabs">
            <button class="tab-btn active" data-status="All">All</button>
            <button class="tab-btn" data-status="Pending">Pending</button>
            <button class="tab-btn" data-status="Dispatched">Dispatched</button>
            <button class="tab-btn" data-status="Delivered">Delivered</button>
            <button class="tab-btn" data-status="Returned">Returned</button>
        </div>

        <div class="controls" style="display: flex; gap: 12px; flex-wrap: wrap;">
            <div class="search-box" style="flex: 1; min-width: 200px;"><i class="ri-search-line"></i><input type="text" id="searchOrders" placeholder="Search phone, name, order ID..."></div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="date" id="dateFrom" class="form-input" style="padding: 10px; height: 42px;">
                <span style="color: var(--text-muted)">to</span>
                <input type="date" id="dateTo" class="form-input" style="padding: 10px; height: 42px;">
            </div>
        </div>

        <div id="loading" class="loading-state"><div class="spinner"></div><p>Loading orders...</p></div>
        <div id="orders-list" class="hidden"></div>

        <!-- Returns History (visible on Returned tab) -->
        <div id="returns-history" class="hidden" style="margin-top:20px">
            <div class="flex-between" style="margin-bottom:12px">
                <h2 style="font-size:16px;font-weight:600"><i class="ri-arrow-go-back-line"></i> Return Records</h2>
                <span id="returnsCount" class="badge badge-default">0</span>
            </div>
            <div id="returns-list" style="display:flex;flex-direction:column;gap:10px"></div>
        </div>
    </div>

    <!-- Update Modal -->
    <div class="modal-overlay" id="updateModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Update Order</h2>
                <button class="btn-icon" onclick="closeUpdateModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="updateOrderId">
                <div class="form-group"><label>Delivery Status</label>
                    <select id="updateDelivery"><option>Pending</option><option>Dispatched</option><option>Delivered</option><option>Returned</option></select>
                </div>
                <div class="form-group"><label>Payment Status</label>
                    <select id="updatePayStatus"><option>Paid</option><option>Unpaid</option><option>Partial</option></select>
                </div>
                <div class="form-group"><label>Payment Method</label>
                    <select id="updatePayMethod"><option value="bKash">bKash</option><option value="Nagad">Nagad</option><option value="COD">COD</option><option value="Bank">Bank Transfer</option></select>
                </div>
                <div class="form-group"><label>Notes</label>
                    <input type="text" id="updateNotes" placeholder="Optional notes">
                </div>
                <button class="btn btn-primary btn-large" id="saveUpdateBtn" onclick="saveUpdate()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Record Payment</h2>
                <button class="btn-icon" onclick="closePaymentModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="payModalOrderId">
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">
                    <div class="form-group"><label>Order Total</label><span id="payModalTotal" style="font-weight:600;font-size:16px">৳0</span></div>
                    <div class="form-group"><label>Already Paid</label><span id="payModalPrevPaid" style="font-weight:600;color:var(--success)">৳0</span></div>
                    <div class="form-group"><label>Due Amount</label><span id="payModalDue" style="font-weight:600;color:var(--danger)">৳0</span></div>
                </div>
                <div class="form-group" style="display:flex;gap:16px;align-items:center">
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                        <input type="radio" name="payType" id="payModalFull" checked onchange="togglePayModalAmount()"> Full Payment
                    </label>
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                        <input type="radio" name="payType" id="payModalPartial" onchange="togglePayModalAmount()"> Add Partial
                    </label>
                </div>
                <div class="form-group" id="payModalAmountRow" style="display:none">
                    <label>Additional Amount (৳)</label>
                    <input type="number" id="payModalAmount" placeholder="Enter amount received" min="0">
                </div>
                <button class="btn btn-primary btn-large" id="confirmPayBtn" onclick="confirmPayment()">Confirm Payment</button>
            </div>
        </div>
    </div>

    <!-- Return Modal -->
    <div class="modal-overlay" id="returnModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Process Return</h2>
                <button class="btn-icon" onclick="closeReturnModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="returnOrderId">
                <input type="hidden" id="returnSerial">
                <input type="hidden" id="returnName">
                <input type="hidden" id="returnColor">
                <input type="hidden" id="returnSize">
                <div id="returnItemInfo" style="padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;margin-bottom:16px;font-size:13px"></div>
                <div class="checkout-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div class="form-group">
                        <label>Set Size (total pieces)</label>
                        <input type="number" id="returnSetSize" value="12" min="1">
                    </div>
                    <div class="form-group">
                        <label>Broken Count</label>
                        <input type="number" id="returnBrokenCount" value="0" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes (optional)</label>
                    <input type="text" id="returnNotes" placeholder="Damage details...">
                </div>
                <div id="returnPreview" style="padding:10px;border-radius:6px;font-size:13px;margin-bottom:12px;background:rgba(16,185,129,0.1);color:#34d399;display:none"></div>
                <button class="btn btn-primary btn-large" id="confirmReturnBtn" onclick="confirmReturn()">Process Return</button>
            </div>
        </div>
    </div>

    <!-- Rebuild Notification -->
    <div id="rebuildBanner" style="display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:600;background:var(--panel-solid);border:2px solid var(--accent);border-radius:12px;padding:16px 24px;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:420px;width:90%">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <i class="ri-refresh-line" style="font-size:24px;color:var(--accent)"></i>
            <div>
                <div style="font-weight:700;font-size:15px">Rebuild Available!</div>
                <div id="rebuildInfo" style="font-size:13px;color:var(--text-muted)"></div>
            </div>
        </div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-success" onclick="executeRebuild()" style="flex:1"><i class="ri-check-line"></i> Rebuild Set</button>
            <button class="btn btn-ghost" onclick="dismissRebuild()" style="flex:1">Dismiss</button>
        </div>
    </div>

    <script>window.APP_CONFIG={API_URL:"https://script.google.com/macros/s/AKfycbwQQrxrQ2A2XuH82kkXM69fX8uskeY93yjos1-AJzKHLhAc682fCLGajURcIlf2tw0M/exec"};</script>
    <script src="shared.js"></script>
    <script src="orders.js"></script>
</body>
</html>
